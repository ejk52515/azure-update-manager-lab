<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="920" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Azure Update Manager Lab — Architecture</text>
  <text x="460" y="56" text-anchor="middle" font-size="13" fill="#5a5a72">Modular Terraform · Remote State · South Africa North</text>

  <!-- Terraform / IaC layer -->
  <rect x="30" y="80" width="380" height="300" rx="10" fill="#f4f1fb" stroke="#7b4fc9" stroke-width="1.5"/>
  <text x="50" y="106" font-size="15" font-weight="700" fill="#5b2d9e">Terraform (Infrastructure as Code)</text>

  <rect x="50" y="120" width="160" height="44" rx="6" fill="#ffffff" stroke="#7b4fc9" stroke-width="1.2"/>
  <text x="130" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#3a3a4a">Root Module</text>
  <text x="130" y="156" text-anchor="middle" font-size="10" fill="#6a6a7a">main · variables · outputs</text>

  <rect x="230" y="120" width="160" height="44" rx="6" fill="#ffffff" stroke="#7b4fc9" stroke-width="1.2"/>
  <text x="310" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#3a3a4a">Remote State</text>
  <text x="310" y="156" text-anchor="middle" font-size="10" fill="#6a6a7a">azurerm backend (blob)</text>

  <text x="50" y="190" font-size="12" font-weight="700" fill="#5b2d9e">Modules</text>
  <rect x="50" y="200" width="160" height="38" rx="6" fill="#ede7f9" stroke="#7b4fc9" stroke-width="1"/>
  <text x="130" y="224" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a3a4a">networking</text>
  <rect x="230" y="200" width="160" height="38" rx="6" fill="#ede7f9" stroke="#7b4fc9" stroke-width="1"/>
  <text x="310" y="224" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a3a4a">keyvault</text>
  <rect x="50" y="248" width="160" height="38" rx="6" fill="#ede7f9" stroke="#7b4fc9" stroke-width="1"/>
  <text x="130" y="272" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a3a4a">compute</text>
  <rect x="230" y="248" width="160" height="38" rx="6" fill="#ede7f9" stroke="#7b4fc9" stroke-width="1"/>
  <text x="310" y="272" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a3a4a">update-manager</text>

  <rect x="50" y="300" width="340" height="64" rx="6" fill="#ffffff" stroke="#b08fe0" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="60" y="320" font-size="11" font-weight="700" fill="#5b2d9e">scripts/validate-lab.ps1</text>
  <text x="60" y="338" font-size="10" fill="#6a6a7a">Triggers assessment · reads results</text>
  <text x="60" y="352" font-size="10" fill="#6a6a7a">Emits aum-compliance-report.json (PASS/FAIL)</text>

  <!-- Arrow IaC -> Azure -->
  <line x1="410" y1="230" x2="470" y2="230" stroke="#5b2d9e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="222" text-anchor="middle" font-size="10" fill="#5b2d9e">deploys</text>

  <!-- Azure Resource Group -->
  <rect x="470" y="80" width="420" height="500" rx="10" fill="#eef5fc" stroke="#0a72c4" stroke-width="1.5"/>
  <text x="490" y="106" font-size="15" font-weight="700" fill="#075299">Azure · Resource Group: rg-aumlab</text>

  <!-- VNet -->
  <rect x="490" y="120" width="380" height="210" rx="8" fill="#ffffff" stroke="#0a72c4" stroke-width="1.2"/>
  <text x="504" y="140" font-size="12" font-weight="700" fill="#075299">VNet 10.0.0.0/16  ·  Subnet 10.0.1.0/24</text>
  <text x="504" y="158" font-size="10.5" fill="#5a5a72">NSG: RDP allowed from admin IP only (/32)</text>

  <rect x="504" y="170" width="110" height="62" rx="6" fill="#dceefb" stroke="#0a72c4" stroke-width="1"/>
  <text x="559" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#075299">DC01</text>
  <text x="559" y="208" text-anchor="middle" font-size="9.5" fill="#5a5a72">Domain Controller</text>
  <text x="559" y="221" text-anchor="middle" font-size="9.5" fill="#5a5a72">10.0.1.4 (static)</text>

  <rect x="630" y="170" width="110" height="62" rx="6" fill="#dceefb" stroke="#0a72c4" stroke-width="1"/>
  <text x="685" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#075299">WS01</text>
  <text x="685" y="208" text-anchor="middle" font-size="9.5" fill="#5a5a72">Workstation</text>
  <text x="685" y="221" text-anchor="middle" font-size="9.5" fill="#5a5a72">domain-joined</text>

  <rect x="756" y="170" width="100" height="62" rx="6" fill="#dceefb" stroke="#0a72c4" stroke-width="1"/>
  <text x="806" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#075299">WS02</text>
  <text x="806" y="208" text-anchor="middle" font-size="9.5" fill="#5a5a72">Workstation</text>
  <text x="806" y="221" text-anchor="middle" font-size="9.5" fill="#5a5a72">domain-joined</text>

  <text x="504" y="258" font-size="10" fill="#5a5a72">All VMs: Windows Server 2022 · Standard_DS1_v2 (1 vCPU)</text>
  <text x="504" y="274" font-size="10" fill="#5a5a72">patch_mode = AutomaticByPlatform (Customer Managed Schedule)</text>
  <text x="504" y="290" font-size="10" fill="#5a5a72">bypass_platform_safety_checks_on_user_schedule = true</text>
  <text x="504" y="312" font-size="10" font-style="italic" fill="#888">DC01 promoted via extension → WS01/WS02 join (depends_on)</text>

  <!-- Key Vault -->
  <rect x="490" y="344" width="180" height="64" rx="8" fill="#fff4e6" stroke="#d9820a" stroke-width="1.2"/>
  <text x="580" y="366" text-anchor="middle" font-size="12" font-weight="700" fill="#9c5c00">Key Vault (RBAC)</text>
  <text x="580" y="382" text-anchor="middle" font-size="9.5" fill="#7a5a2a">secret: vm-admin-password</text>
  <text x="580" y="396" text-anchor="middle" font-size="9.5" fill="#7a5a2a">Secrets Officer role assignment</text>

  <!-- Update Manager -->
  <rect x="686" y="344" width="184" height="64" rx="8" fill="#e9f7ee" stroke="#1f9d57" stroke-width="1.2"/>
  <text x="778" y="366" text-anchor="middle" font-size="12" font-weight="700" fill="#0f6e3a">Azure Update Manager</text>
  <text x="778" y="382" text-anchor="middle" font-size="9.5" fill="#2a6a45">Maintenance Config (weekly)</text>
  <text x="778" y="396" text-anchor="middle" font-size="9.5" fill="#2a6a45">3 VM assignments</text>

  <!-- Policy -->
  <rect x="490" y="422" width="380" height="58" rx="8" fill="#fdeef2" stroke="#c43b6b" stroke-width="1.2"/>
  <text x="680" y="444" text-anchor="middle" font-size="12" font-weight="700" fill="#9c1f48">Azure Policy — Periodic Assessment</text>
  <text x="680" y="461" text-anchor="middle" font-size="9.5" fill="#8a3a55">SystemAssigned managed identity · scope: rg-aumlab</text>
  <text x="680" y="474" text-anchor="middle" font-size="9.5" fill="#8a3a55">auto-enrolls VMs into periodic patch assessment</text>

  <!-- Outcome -->
  <rect x="490" y="494" width="380" height="72" rx="8" fill="#f0f0f4" stroke="#5a5a72" stroke-width="1"/>
  <text x="680" y="516" text-anchor="middle" font-size="12" font-weight="700" fill="#3a3a4a">Compliance Outcome</text>
  <text x="680" y="534" text-anchor="middle" font-size="10" fill="#5a5a72">Assess → Schedule → Report</text>
  <text x="680" y="550" text-anchor="middle" font-size="10" fill="#1f9d57" font-weight="600">DC01 · WS01 · WS02 = PASS (0 critical/security missing)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b2d9e"/>
    </marker>
  </defs>
</svg>
